# =============================================================================
# This is the SINGLE SOURCE OF TRUTH for every parameter and initialisation
# setting in the model. It is loaded and validated into a frozen `Config`
# object at startup (see config.py). Nothing in the codebase should hardcode a
# numeric assumption that belongs here.
#
# To run an experiment with different parameters, copy this file, edit it, and
# pass the path to `load_config(path)`
# =============================================================================

# -----------------------------------------------------------------------------
# [sim] — top-level run and population sizes
# -----------------------------------------------------------------------------
[sim]
n_households          = 100
n_institutions        = 5
n_properties          = 120     # NOTE: run.py used 120; model.py default was 130 (see config.py MISMATCHES)
target_ownership_rate = 0.65    # plan.md §19 calibration target ~65%
inst_ownership_share  = 0.10    # fraction of stock allocated to institutions at init
seed                  = 42
n_steps               = 500      # default number of steps for a baseline run
# Initial-tenure mode (see config.py / model.py):
#   "emergent" — ownership is NOT forced; it falls out of who can afford a deposit
#                given drawn wealth + LTV. This is the scientific/default setting:
#                the ~65% owner-occupancy rate (plan §19/§23) is meant to EMERGE,
#                not be imposed (see TODO.md: calibration debt).
#   "target"   — DIAGNOSTIC ONLY. Forces ownership to target_ownership_rate at t=0
#                (wealthiest households become owners; cash topped up if short so
#                balance sheets stay feasible & accounting-consistent). Use it to
#                isolate faults: if the market stays healthy when started at 65%,
#                the problem is the initial wealth distribution, not the market
#                rules. NEVER report target-mode runs as results.
ownership_mode        = "emergent"

# -----------------------------------------------------------------------------
# [spatial] — 2D toroidal grid topology
# Zones are laid out on a grid_rows x grid_cols torus; n_zones = rows * cols.
# Each agent's consideration set = its own zone + the 4 von Neumann neighbours
# (up/down/left/right, wrapping around the torus edges).
#
# WHY a 4x4 torus (Z=16) instead of plan.md's nominal "Z=10"?
#   1. plan.md §3 only requires "zones" with "adjacent zones" — it does NOT
#      mandate a specific topology; the 2D torus is our concrete realisation.
#   2. Z=10 cannot form a non-degenerate torus: its only factorisation is 2x5,
#      and any grid dimension of size 2 makes the two neighbours on that axis
#      collapse onto the SAME zone (`(x-1)%2 == (x+1)%2`). Both dimensions must
#      be >= 3 for four DISTINCT neighbours.
#   3. A torus removes edge effects: every zone has exactly 4 neighbours, so all
#      agents face a symmetric consideration set (no corner/edge agents with
#      fewer options).
#   4. You can scale 'grid_rows' and 'grid_cols' to adjust spatial resolution; 
#      increasing dimensions makes the model more local and granular, while 
#      decreasing them increases market thickness at the cost of locality.
# -----------------------------------------------------------------------------
[spatial]
grid_rows = 10
grid_cols = 10

# -----------------------------------------------------------------------------
# [property_init] — housing stock generation
# q_k = mu_z + nu_k, with mu_z ~ N(0, zone_quality_sd) and
# nu_k ~ N(0, property_residual_sd); qualities then standardised to mean 0 sd 1.
# anchor price = base_price + price_sensitivity * quality.
# base_price is a CALIBRATED market anchor (plan §19 targets: price-to-income,
# price-to-rent 20-30x), NOT an arbitrary constant — tune it during calibration.
# -----------------------------------------------------------------------------
[property_init]
zone_quality_sd      = 0.5
property_residual_sd = 0.5
base_price           = 200000.0
price_sensitivity    = 50000.0

# -----------------------------------------------------------------------------
# [agent_init] — distributions agents are drawn from at initialisation
# Households: income       ~ LogNormal(log(income_median), income_sigma);
#             total wealth ~ Uniform(wealth_income_mult_low, _high) * income;
#             risk         ~ LogNormal(risk_aversion_mu, risk_aversion_sigma);
#             origination LTV ~ Uniform(ltv_dist_low, ltv_dist_high),
#                               capped at credit.ltv_limit (plan §17: LTV drawn
#                               from a distribution, not fixed at the cap).
# Balance sheets are DERIVED from ownership allocations (plan §17-18): for an
# owner, deposit = (1 - LTV) * price, equity = deposit, mortgage = LTV * price,
# liquid cash = total wealth - deposit. This makes the accounting identity
# HousingAssets = HousingEquity + MortgageDebt hold by construction.
#
# Private landlords at t=0 (plan §17): a fraction `landlord_share` of owner
# households also own extra (let-out) properties; the extra-portfolio size is
# right-skewed (Geometric(landlord_portfolio_geom_p), >= 1).
#   NOTE: landlords currently finance buy-to-let at the standard mortgage_rate;
#   a separate BTL funding rate r_f^BTL (plan §6) is not yet modelled.
#
# Institutions: cash ~ Uniform(inst_cash_low, inst_cash_high);
#               funding_rate ~ Uniform(inst_funding_rate_low, inst_funding_rate_high).
# -----------------------------------------------------------------------------
[agent_init]
income_median            = 35000.0   # plan.md §19 wants ONS ASHE calibration (placeholder)
income_sigma             = 0.5
wealth_income_mult_low   = 0.8       # total wealth as a multiple of income (was cash_mult); CALIBRATION KNOB for ownership rate (see TODO.md)
wealth_income_mult_high  = 3.0
ltv_dist_low             = 0.70      # origination LTV distribution (plan §17 / FCA MPSD); capped at credit.ltv_limit
ltv_dist_high            = 0.85
landlord_share           = 0.10      # fraction of owner households that are also landlords at t=0
landlord_portfolio_geom_p = 0.6      # Geometric p for extra-portfolio size (mean ~1/p, right-skewed)
risk_aversion_mu         = 0.0       # plan.md §8: gamma ~ LogNormal(mu_gamma, sigma_gamma)
risk_aversion_sigma      = 0.5
inst_cash_low            = 5000000.0
inst_cash_high           = 20000000.0
inst_funding_rate_low    = 0.02
inst_funding_rate_high   = 0.03

# -----------------------------------------------------------------------------
# [agent] — decision-rule (behavioural) parameters
# -----------------------------------------------------------------------------
[agent]
beta_action                  = 1.0    # logit temperature, Stage 1 action choice
beta_property                = 0.5    # logit temperature, Stage 2 property choice
income_reversion             = 0.05   # mean-reversion speed of income (TODO: plan wants growth draws, not reversion)
income_shock_sd              = 0.05   # log-scale income shock volatility
sell_score_offset            = 0.02   # household sell vs hold logit offset
inst_sell_score_offset       = 0.01   # institution sell vs hold logit offset
inst_ltv                     = 0.60   # institution leverage in WTP
inst_required_return         = 0.03   # institutional risk premium (annual)
inst_min_yield               = 0.05   # activity hurdle: institutions only bid where gross yield (annual rent/price) >= this (walkthrough choice G). Set at top of plan §19 4-5% yield band; produces the loose->tight marginal-pricer switch (loose: HH win ~80%; tight: institutions win ~70%+). 0.06 is too high — loose yields ~4.5%, institutions never activate.
inst_max_bids_per_step       = 9999   # throttle for institutional purchase activity; large value disables the cap

# -----------------------------------------------------------------------------
# [credit] — credit environment / banks (reduced-form, plan.md §9)
# btl_* are the buy-to-let terms for private landlords; plan §6 requires
# r_f^BTL (btl_funding_rate) > institutional r_f (agent_init.inst_funding_rate_*).
# -----------------------------------------------------------------------------
[credit]
mortgage_rate              = 0.05
ltv_limit                  = 0.85
dti_limit                  = 0.35
loan_term_years            = 25
rent_affordability_fraction = 0.35   # same concept as valuation.rent_income_fraction
btl_funding_rate           = 0.06    # buy-to-let funding rate for private landlords (r_f^BTL)
btl_ltv                    = 0.75    # buy-to-let leverage

# -----------------------------------------------------------------------------
# [valuation] — willingness-to-pay / rent estimation
# -----------------------------------------------------------------------------
[valuation]
rent_income_fraction    = 0.35   # max share of income spent on rent (= credit.rent_affordability_fraction)
quality_sensitivity     = 0.3    # elasticity of achievable rent to property quality
operating_cost_fraction = 0.15   # operating costs as a fraction of rent (landlords & institutions)
quality_value_scale     = 1.0    # owner-occupier consumption value of a home as a multiple of its annual market rent (kappa)
# Expected capital gain E[dp] in the WTP numerator (plan §11). Two modes break the
# explosive realised-price -> WTP -> realised-price feedback loop (A/B testable):
#   "fixed_level"    — E[dp] = expected_capital_gain_level (£/period), independent of price.
#   "bounded_growth" — E[dp] = g * market_price, with g CLAMPED to
#                      [capital_gain_growth_min, capital_gain_growth_max] and sourced from
#                      the rent-growth/macro signal (income-driven), NOT the realised-price EMA.
capital_gain_mode           = "fixed_level"
expected_capital_gain_level = 2000.0   # £/period; used in "fixed_level" mode (plan §11: modest level)
capital_gain_growth_min     = -0.02    # per-period growth clamp (lower); used in "bounded_growth" mode
capital_gain_growth_max     = 0.02     # per-period growth clamp (upper); used in "bounded_growth" mode
# Fundamentals ceilings — a hard SAFETY NET on the FINAL bid, anchored to the bidder's
# real economic capacity (applied as the last step of WTP, after all belief terms). They
# guarantee no bid can detach from fundamentals. Should bind rarely: if the bind-rate
# metric exceeds ~50%, the expectation damping (capital_gain_mode) is doing too little.
max_price_to_income = 4.5    # households: price <= this * annual income (realistic UK value)
max_price_to_rent   = 25.0   # landlords + institutions: price <= this * gross annual rent

# -----------------------------------------------------------------------------
# [expectations] — adaptive expectation formation (plan.md §7)
# E_t = delta * E_{t-1} + (1 - delta) * Signal_t
# -----------------------------------------------------------------------------
[expectations]
delta             = 0.7   # smoothing weight on prior expectation
init_price_growth = 0.02  # initial expected price growth
init_rent_growth  = 0.02  # initial expected rent growth
signal_window     = 5     # number of recent periods used to compute growth signals
noise_sd          = 0.005 # independent expectation noise added per agent each update
    

# -----------------------------------------------------------------------------
# [market] — listing, reservation, and seeding parameters used by the model loop
# -----------------------------------------------------------------------------
[market]
household_sell_reservation_discount = 0.95   # reservation = anchor * this (owner-occupier / private landlord)
inst_sell_reservation_discount      = 0.97   # reservation = anchor * this (institution)
landlord_reservation_yield          = 0.04   # reservation rent = anchor * yield / 12
min_reservation_rent                = 200.0
initial_rent_yield                  = 0.045  # initial avg rent = median price * yield / 12
fallback_price                      = 200000.0  # price-history seed / fallback when no transactions
lease_expiry_prob                   = 0.0833 # per-period prob an active tenancy ends AFTER the minimum term (landlord non-renewal OR tenant move); ~1/12 => mean tenure ~3yr. Recirculates rental supply so avg_rent is re-discovered every period (plan §21)
min_lease_quarters                  = 4      # minimum lease term in quarters before normal turnover applies; 4 = 1 year (use 2 for 6 months)
lease_early_exit_prob               = 0.01   # low hazard DURING the minimum term (real break clauses/relocation/distress); set 0.0 to forbid early exit entirely
	# Loss aversion: multiple >1 increases reservation price when seller faces
	# a nominal loss relative to their purchase anchor `p_0`. Institutions are
	# exempt (lambda = 0).
	loss_aversion_owner = 1.30
	loss_aversion_landlord = 1.15
	estimated_value_smooth_alpha = 1.0

[debug]
enable_bid_logging = false

