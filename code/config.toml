# =============================================================================
# Housing Market ABM — canonical parameter file.
#
# This is the SINGLE SOURCE OF TRUTH for every parameter and initialisation
# setting in the model. It is loaded and validated into a frozen `Config`
# object at startup (see config.py). Nothing in the codebase should hardcode a
# numeric assumption that belongs here.
#
# To run an experiment with different parameters, copy this file, edit it, and
# pass the path to `load_config(path)` — or override fields programmatically
# with `dataclasses.replace` on the loaded Config.
#
# Each value below mirrors the value the code used *before* this file existed,
# so loading these defaults reproduces the original baseline run exactly.
# Provenance / calibration notes and known mismatches with plan.md are recorded
# inline and summarised in config.py.
# =============================================================================

# -----------------------------------------------------------------------------
# [sim] — top-level run and population sizes
# -----------------------------------------------------------------------------
[sim]
n_households          = 100
n_institutions        = 5
n_properties          = 120     # NOTE: run.py used 120; model.py default was 130 (see config.py MISMATCHES)
n_zones               = 10
target_ownership_rate = 0.65    # plan.md §19 calibration target ~65%
inst_ownership_share  = 0.10    # fraction of stock allocated to institutions at init
seed                  = 42
n_steps               = 30      # default number of steps for a baseline run

# -----------------------------------------------------------------------------
# [property_init] — housing stock generation
# q_k = mu_z + nu_k, with mu_z ~ N(0, zone_quality_sd) and
# nu_k ~ N(0, property_residual_sd); qualities then standardised to mean 0 sd 1.
# anchor price = base_price + price_sensitivity * quality.
# -----------------------------------------------------------------------------
[property_init]
zone_quality_sd      = 0.5
property_residual_sd = 0.5
base_price           = 200000.0
price_sensitivity    = 50000.0

# -----------------------------------------------------------------------------
# [agent_init] — distributions agents are drawn from at initialisation
# Households: income ~ LogNormal(log(income_median), income_sigma);
#             cash    ~ Uniform(cash_mult_low, cash_mult_high) * income;
#             risk    ~ LogNormal(risk_aversion_mu, risk_aversion_sigma).
# Institutions: cash ~ Uniform(inst_cash_low, inst_cash_high);
#               funding_rate ~ Uniform(inst_funding_rate_low, inst_funding_rate_high).
# -----------------------------------------------------------------------------
[agent_init]
income_median            = 35000.0   # plan.md §19 wants ONS ASHE calibration (placeholder)
income_sigma             = 0.5
cash_mult_low            = 0.5
cash_mult_high           = 2.0
risk_aversion_mu         = 0.0       # plan.md §8: gamma ~ LogNormal(mu_gamma, sigma_gamma)
risk_aversion_sigma      = 0.5
inst_cash_low            = 5000000.0
inst_cash_high           = 20000000.0
inst_funding_rate_low    = 0.02
inst_funding_rate_high   = 0.03

# -----------------------------------------------------------------------------
# [agent] — decision-rule (behavioural) parameters
# -----------------------------------------------------------------------------
[agent]
beta_action                  = 1.0    # logit temperature, Stage 1 action choice
beta_property                = 0.5    # logit temperature, Stage 2 property choice
income_reversion             = 0.05   # mean-reversion speed of income (TODO: plan wants growth draws, not reversion)
income_shock_sd              = 0.05   # log-scale income shock volatility
sell_score_offset            = 0.02   # household sell vs hold logit offset
inst_sell_score_offset       = 0.01   # institution sell vs hold logit offset
inst_operating_cost_fraction = 0.15   # institution operating costs as fraction of rent
inst_ltv                     = 0.60   # institution leverage in WTP

# -----------------------------------------------------------------------------
# [credit] — credit environment / banks (reduced-form, plan.md §9)
# -----------------------------------------------------------------------------
[credit]
mortgage_rate              = 0.05
ltv_limit                  = 0.85
dti_limit                  = 0.35
loan_term_years            = 25
rent_affordability_fraction = 0.35   # same concept as valuation.rent_income_fraction

# -----------------------------------------------------------------------------
# [valuation] — willingness-to-pay / rent estimation
# -----------------------------------------------------------------------------
[valuation]
rent_income_fraction = 0.35   # max share of income spent on rent (= credit.rent_affordability_fraction)
quality_sensitivity  = 0.3    # elasticity of achievable rent to property quality

# -----------------------------------------------------------------------------
# [expectations] — adaptive expectation formation (plan.md §7)
# E_t = delta * E_{t-1} + (1 - delta) * Signal_t
# -----------------------------------------------------------------------------
[expectations]
delta             = 0.7   # smoothing weight on prior expectation
init_price_growth = 0.02  # initial expected price growth
init_rent_growth  = 0.02  # initial expected rent growth
signal_window     = 5     # number of recent periods used to compute growth signals

# -----------------------------------------------------------------------------
# [market] — listing, reservation, and seeding parameters used by the model loop
# -----------------------------------------------------------------------------
[market]
household_sell_reservation_discount = 0.95   # reservation = anchor * this (owner-occupier / private landlord)
inst_sell_reservation_discount      = 0.97   # reservation = anchor * this (institution)
landlord_reservation_yield          = 0.04   # reservation rent = anchor * yield / 12
min_reservation_rent                = 200.0
initial_rent_yield                  = 0.045  # initial avg rent = median price * yield / 12
fallback_price                      = 200000.0  # price-history seed / fallback when no transactions
