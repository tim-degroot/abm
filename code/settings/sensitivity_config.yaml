# =============================================================================
# SA Harness Configuration
# =============================================================================
# Edit this file to change parameters, response functions, or compute settings.
# The harness reads this file at runtime — no code changes needed.


sobol:
  N: 512                    # base sample size (total runs = N × (2k+2)).
  seed: 42                  # rng seed for Saltelli sequence

stochastic:
  n_seeds: 10               # stochastic replicates per parameter set.
                            # Run ``evaluate --model-seed S`` for each S in 0..9.
                            # Not read by the code — it counts the seed_*.csv files.

steps: 1200                  # simulation length (set to e.g. 24 for quick smoke tests)


parameters:
  - name: n_households
    path: sim.n_households
    bounds: [375, 625]
    distribution: int

  - name: search_radius
    path: spatial.search_radius
    bounds: [0, 2]
    distribution: int

  - name: mortgage_rate
    path: credit.mortgage_rate
    bounds: [0.001, 0.01]
    distribution: log-uniform

  - name: ltv_limit
    path: credit.ltv_limit
    bounds: [0.60, 0.95]
    distribution: uniform

  - name: dti_limit
    path: credit.dti_limit
    bounds: [0.20, 0.45]
    distribution: uniform

  - name: btl_funding_rate
    path: credit.btl_funding_rate
    bounds: [0.0025, 0.025]
    distribution: log-uniform

  - name: inst_funding_rate
    path: credit.inst_funding_rate
    bounds: [0.0015, 0.015]
    distribution: log-uniform



responses:
  - name: mean_price
    metric: avg_sale_price
    reduce: nanmean
    description: "Mean sale price over the run"

  - name: price_volatility
    metric: avg_sale_price
    reduce: nanstd
    description: "Std dev of sale price (full run)"

  - name: inst_share_final
    metric: institutional_ownership_share
    reduce: last
    description: "Institutional ownership share at final step"

  - name: oo_share
    metric: owner_occupier_share
    reduce: nanmean
    description: "Mean owner-occupier share of winning bids"

  - name: landlord_share
    metric: landlord_share
    reduce: nanmean
    description: "Mean landlord share of winning bids"

  - name: inst_share
    metric: institution_share
    reduce: nanmean
    description: "Mean institutional share of winning bids"

  - name: vacancy
    metric: vacancy_rate
    reduce: nanmean
    description: "Mean vacancy rate"



parallel:
  n_cores: -1               # -1 = os.cpu_count(), or set e.g. 8
  backend: multiprocessing


output:
  dir: results/sensitivity
  plot: sobol_indices.png
  data: sobol_results.csv
