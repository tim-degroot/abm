# =============================================================================
# SA Harness Configuration
# =============================================================================
# Edit this file to change parameters, response functions, or compute settings.
# The harness reads this file at runtime — no code changes needed.


sobol:
  N: 4                     # base sample size (total runs = N × (2k+2)).
                            # SMOKE size. For production use N: 512 or 1024 so the
                            # Sobol confidence intervals are tight.
  seed: 42                 # rng seed for Saltelli sequence

stochastic:
  n_seeds: 10              # stochastic replicates per parameter set.
                            # Run ``evaluate --model-seed S`` for each S in 0..9.
                            # Not read by the code — it counts the seed_*.csv files.

steps: 720                 # simulation length (set to e.g. 24 for quick smoke tests)


parameters:
  - name: mortgage_rate
    path: credit.mortgage_rate
    bounds: [0.001, 0.01]
    distribution: log-uniform

  - name: ltv_limit
    path: credit.ltv_limit
    bounds: [0.60, 0.95]
    distribution: uniform

  - name: dti_limit
    path: credit.dti_limit
    bounds: [0.20, 0.45]
    distribution: uniform

  - name: btl_ltv
    path: credit.btl_ltv
    bounds: [0.50, 0.85]
    distribution: uniform

  - name: inst_ltv
    path: credit.inst_ltv
    bounds: [0.40, 0.75]
    distribution: uniform

  - name: inst_required_return
    path: agent_init.inst_required_return
    bounds: [0.001, 0.01]
    distribution: log-uniform

  - name: loss_aversion
    path: agent_init.loss_aversion
    bounds: [1.0, 2.5]      # loss aversion is lambda >= 1 by definition
    distribution: uniform

  - name: risk_aversion_mu
    path: agent_init.risk_aversion_mu
    bounds: [-2.0, 0.0]     # log-mean of household risk aversion gamma
    distribution: uniform

  - name: smoothing
    path: expectations.smoothing
    bounds: [0.5, 0.98]     # EWMA persistence of expectations
    distribution: uniform


responses:
  - name: mean_price
    metric: avg_sale_price
    reduce: nanmean
    description: "Mean sale price over the run"

  - name: price_volatility
    metric: avg_sale_price
    reduce: nanstd
    description: "Std dev of sale price (full run)"

  - name: inst_share_final
    metric: institutional_ownership_share
    reduce: last
    description: "Institutional ownership share at final step"

  - name: inst_marginal_pricer
    metric: institution_share
    reduce: nanmean
    description: "Mean institutional share of winning bids (marginal pricer)"

  - name: vacancy
    metric: vacancy_rate
    reduce: nanmean
    description: "Mean vacancy rate"



parallel:
  n_cores: -1               # -1 = os.cpu_count(), or set e.g. 8
  backend: multiprocessing


output:
  dir: results/sensitivity
  plot: sobol_indices.png
  data: sobol_results.csv
